services:
  web:
    image: users_service:1.0.0
    container_name: user-service
    restart: always
    env_file: .env
    depends_on:
      - db
    ports:
      - "8001:8001"

  db:
    image: postgres:18-bookworm
    container_name: scroll-db-postgres
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
