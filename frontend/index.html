<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- Login Form -->
        <div id="auth-container">
            <h2 style="text-align: center;">Scroll</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="register()" style="background:#444;">Register</button>
        </div>

        <!-- Video Feed Container -->
        <div id="video-feed-container" style="display: none;">
            <div class="header">
                <h3>For You</h3>
                <input type="file" id="video-upload" accept="video/*" onchange="uploadVideo()" style="display:none;">
                <button onclick="document.getElementById('video-upload').click()">Upload Video</button>
            </div>

            <div class="video-feed" id="video-feed">
                <!-- Videos will be injected here -->
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
